<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frühmarkt - Flohmarkt Finder</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a class="site-title" href="index.html">Flohmarkts in Hamburg</a>
            <nav class="site-nav">
                <a class="site-nav-link" href="index.html">Browse</a>
                <a class="site-nav-link site-nav-link-active" href="map.html">Map</a>
                <a class="site-nav-link" href="favourites.html">Favourites</a>
            </nav>
        </div>
    </header>

    <main class="page-shell">
        <section class="page-intro">
            <p class="eyebrow">MAP</p>
            <h1>Markets across Hamburg</h1>
            <p>Select a pin to see market details.</p>
        </section>
        <div id="market-map" class="market-map"></div>
        <section id="map-market-detail"></section>
    </main>

    <footer class="site-footer">
        <p>Event data from the official Hamburg API. Weather forecasts from Open-Meteo.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        var map = L.map('market-map').setView([53.57, 10], 11.5); 
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'}).addTo(map);
    </script>
    <script src="js/map.js"></script>
</body>
</html>
